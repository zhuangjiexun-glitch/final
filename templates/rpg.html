<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宮尋寶 - 命運大廳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="orb"></div>

    <div style="display: flex; position: relative; width: 100%; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; z-index: 10;">
        <h1 class="fortune-title" style="margin-bottom: 20px; z-index: 5;">💰 迷宮尋寶</h1>
        
        <canvas id="gameCanvas" width="800" height="400" style="background-color: rgba(20, 20, 40, 0.9); border: 2px solid rgba(170, 120, 255, 0.5); border-radius: 8px; cursor: default; z-index: 4; box-shadow: 0 0 30px rgba(170, 120, 255, 0.2);"></canvas>
        
        <div id="gameInfo" style="margin-top: 20px; background: rgba(12, 8, 30, 0.9); padding: 15px; border-radius: 8px; border: 1px solid rgba(170, 120, 255, 0.3); min-width: 300px; text-align: center; z-index: 5;">
            <div style="font-size: 16px; color: rgba(255, 255, 255, 0.9); margin-bottom: 8px;">
                <strong>當前獲得元智幣：</strong><span id="gameBalance" style="color: #ffd700; font-weight: bold; font-size: 20px;">0</span>
            </div>
            <div style="font-size: 14px; color: rgba(255, 255, 255, 0.6);">
                ⌨️ 使用【方向鍵】移動，接近寶箱按【E】打開
            </div>
        </div>
        
        <button class="back-btn" onclick="endRpgGame()" style="position: absolute; top: 30px; left: 30px; z-index: 1000; background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;">
        💰 結算並返回大廳
        </button>
        
        <div id="mathQuizModal" style="display: none; position: fixed; inset: 0; background: rgba(5, 5, 20, 0.95); z-index: 50; justify-content: center; align-items: center; flex-direction: column;">
            <div style="background: rgba(12, 8, 30, 0.98); padding: 30px; border-radius: 16px; border: 1px solid rgba(170, 120, 255, 0.4); max-width: 400px; width: 90%; text-align: center;">
                <h2 style="color: #ffd700; margin-bottom: 20px; font-size: 20px;">📜 解開謎題</h2>
                <div id="mathQuestion" style="font-size: 22px; color: rgba(255, 255, 255, 0.9); margin-bottom: 25px; font-weight: bold;"></div>
                <div id="mathOptions" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;"></div>
                <div style="font-size: 14px; color: rgba(255, 255, 255, 0.5); margin-top: 10px;">回答正確可獲得寶箱獎勵</div>
            </div>
        </div>
    </div>

    <script src="/static/js/data.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/rpg.js"></script>
    </body>
</html>

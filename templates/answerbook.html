<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答案之書 - 命運大廳</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>

</body>
    <div id="answerBookPage" style="display: flex; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 20px; box-sizing: border-box;">
        <h1 class="fortune-title" style="margin-bottom: 10px; z-index: 5; color: white;">
        <h1 class="fortune-title" style="margin-bottom: 10px; z-index: 5; color: white;">
            答案之書
        </h1>
        <p class="fortune-subtitle" style="margin-bottom: 40px; z-index: 5; color: white;">
            在心中默念你的問題，準備好後點擊書本。<br>
            <span style="color: #ffd700; font-size: 14px;">(再次點擊即可直接翻閱下一個解答)</span>
        </p>

        <div class="open-book-wrapper" onclick="flipBook()">
            <div class="book-cover">
                
                <div class="page page-left">
                    <div class="page-ornament">
                        <svg viewBox="0 0 100 20" width="80">
                            <path fill="none" stroke="#444" stroke-width="1.5" d="M10,10 Q25,0 40,10 T70,10 M50,5 A5,5 0 1,1 50,15 A5,5 0 1,1 50,5"></path>
                        </svg>
                    </div>
                </div>
                
                <div class="page page-right">
                    <div class="page-border">
                        <div id="answerResult" class="answer-text">
                            請點擊書本<br><br>
                            <span style="font-size: 14px; font-weight: normal; color: #666;">尋找解答</span>
                        </div>
                    </div>
                </div>

                <div id="flippingPage" class="flipping-page">
                    <div class="page-border"></div>
                </div>

            </div>
        </div>

        <button class="back-btn" onclick="window.location.href='/'" style="position: absolute; top: 30px; left: 30px; z-index: 1000; background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;">
            ⬅ 返回大廳
        </button>
    </div>

        <script src="/static/js/data.js"></script>
        <script src="/static/js/main.js"></script>
        <script src="/static/js/answerbook.js"></script>
</body>
</html>

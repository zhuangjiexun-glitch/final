<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈福擲筊 - 命運大廳</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="orb"></div>

    <div id="jiaoPage" style="display: flex; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 20px; box-sizing: border-box;">
        
        <h1 class="fortune-title" style="margin-bottom: 10px; z-index: 5; color: white;">
            祈福擲筊
        </h1>
        <p class="fortune-subtitle" id="jiaoSubtitle" style="margin-bottom: 30px; z-index: 5; color: white;">
            在心中默念你想詢問的問題，神明會回答你
        </p>
        
        <div style="background: rgba(12, 8, 30, 0.6); padding: 40px; border-radius: 16px; border: 1px solid rgba(170, 120, 255, 0.4); max-width: 550px; width: 100%; text-align: center; z-index: 5; box-shadow: 0 0 30px rgba(170, 120, 255, 0.1); box-sizing: border-box;">
            
            <select id="jiaoTypeSelector" style="width: 100%; padding: 12px 20px; font-size: 18px; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(170,120,255,0.5); margin-bottom: 20px; outline: none; font-family: inherit; box-sizing: border-box;">
                <option value="" style="background: #0c081e;">-- 請選擇你想祈求的項目 --</option>
                <option value="愛情" style="background: #0c081e;">❤️ 愛情 (姻緣紅線)</option>
                <option value="學業" style="background: #0c081e;">🎓 學業 (金榜題名)</option>
                <option value="事業" style="background: #0c081e;">💼 事業 (步步高升)</option>
                <option value="財運" style="background: #0c081e;">💰 財運 (財源廣進)</option>
            </select>

            <div id="godDisplay" style="margin: 15px; font-size: 22px; color: #ffd700; font-weight: bold; min-height: 30px;"></div>
            
            <div id="godImageArea" style="min-height: 120px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center;">
                <img id="godImg" src="" alt="神明" style="max-height: 120px; border-radius: 50%; display: none; border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.4);">
            </div>

            <div style="min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);">
                <img id="jiaoImgDisplay" src="" alt="筊杯" style="max-height: 120px; display: none; margin-bottom: 10px;">
                <div id="jiaoResultText" style="font-size: 26px; font-weight: bold; color: #64ff64;"></div>
            </div>

            <button id="btnThrowJiao" style="width: 100%; background: linear-gradient(135deg, #ff9800, #ff5722); border: none; color: white; padding: 14px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: inherit; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3);">
                開始擲筊
            </button>
        </div>

        <button class="back-btn" onclick="window.location.href='/'" style="position: absolute; top: 30px; left: 30px; z-index: 1000; background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;">
            ⬅ 返回大廳
        </button>
    </div>

    <script src="/static/js/data.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/jiao.js"></script>
    </body>
</html>

<!-- 2. 解夢專屬頁面 -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周公解夢 - 命運大廳</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>

</body>
    <div id="dreamPage" style="display: flex; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 20px; box-sizing: border-box;">
        <h1 class="fortune-title" style="margin-bottom: 10px; z-index: 5; color: white;">
            周公解夢
        </h1>
        <p class="fortune-subtitle" style="margin-bottom: 30px; z-index: 5; color: white;">
            寫下你昨晚的夢境，讓宇宙為你解碼
        </p>

        <div style="background: rgba(12, 8, 30, 0.7); padding: 30px; border-radius: 16px; border: 1px solid rgba(170, 120, 255, 0.4); max-width: 600px; width: 90%; z-index: 5; box-shadow: 0 0 40px rgba(170, 120, 255, 0.15); display: flex; flex-direction: column; gap: 20px;">
            
            <textarea id="dreamInput" placeholder="我夢見了..." rows="5" style="width: 100%; padding: 15px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(170, 120, 255, 0.3); color: white; font-size: 16px; outline: none; resize: none; font-family: inherit;"></textarea>

            <button id="submitDreamBtn" onclick="analyzeDream()" style="background: linear-gradient(135deg, #9b5cff, #6f3cff); border: none; color: white; padding: 14px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%;">
                解開夢境 (💰10)
            </button>

            <div id="dreamLoading" style="display: none; color: #d8b4ff; text-align: center; font-style: italic; font-size: 16px; padding: 10px;">
                🌙 潛意識連結中，請稍候...
            </div>

            <div id="dreamResult" style="display: none; font-size: 15px; color: rgba(255, 255, 255, 0.95); line-height: 1.8; background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 12px; border: 1px solid rgba(170, 120, 255, 0.2); max-height: 300px; overflow-y: auto;">
            </div>
        </div>

        <button class="back-btn" onclick="window.location.href='/'" style="position: absolute; top: 30px; left: 30px; z-index: 1000; background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;">
            ⬅ 返回大廳
        </button>
    </div>

    <script src="/static/js/data.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/dream.js"></script>
</body>
</html>

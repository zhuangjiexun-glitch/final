<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷諾曼卡 - 命運大廳</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="stars" id="stars"></div>
    <div class="orb"></div>

    <div style="display: flex; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 20px; box-sizing: border-box;">
        
        <h1 class="fortune-title" style="margin-bottom: 10px; z-index: 5; color: white;">
            雷諾曼卡占卜
        </h1>
        <p class="fortune-subtitle" id="lenormandSubtitle" style="margin-bottom: 30px; z-index: 5; color: white;">
            雷諾曼卡會以最直接的方式回答問題。請在心中默念，然後開始抽牌。
        </p>

        <div style="background: rgba(12, 8, 30, 0.7); padding: 30px; border-radius: 16px; border: 1px solid rgba(170, 120, 255, 0.4); max-width: 700px; width: 100%; text-align: center; z-index: 5; box-shadow: 0 0 30px rgba(170, 120, 255, 0.1); box-sizing: border-box;">
                
            <input type="text" id="lenormandQuestion" placeholder="請輸入你想占卜的具體問題 (例如：這個月的工作運如何？)" style="width: 100%; padding: 15px; box-sizing: border-box; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(170, 120, 255, 0.3); color: white; font-size: 16px; outline: none; margin-bottom: 20px;">

            <button id="drawLenormandBtn" onclick="startDrawLenormand()" style="background: linear-gradient(135deg, #9b5cff, #6f3cff); border: none; color: white; padding: 14px 40px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;">
                開始抽牌 (💰20)
            </button>

            <p id="lenormandProgressText" style="display: none; color: #64c8ff; font-size: 16px; margin: 10px 0;">請依序點擊翻開 3 張牌 (0/3)</p>

            <div id="lenormandCardsArea" style="display: none; justify-content: center; gap: 20px; margin: 20px 0;">
            </div>

            <div id="lenormandLoading" style="display: none; color: #ffd700; margin: 15px 0; font-style: italic; font-size: 16px;">
                🦊 牌陣已成，正在解碼訊息...
            </div>

            <div id="lenormandResult" style="display: none; font-size: 16px; color: rgba(255, 255, 255, 0.95); line-height: 1.8; background: rgba(0, 0, 0, 0.5); padding: 20px; border-radius: 12px; border: 1px solid rgba(170, 120, 255, 0.3); text-align: left; margin-top: 15px;">
            </div>

            <button id="resetLenormandBtn" onclick="resetLenormand()" style="display: none; margin-top: 20px; background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); color: rgba(255, 255, 255, 0.8); padding: 10px 30px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 16px;">
                直接進行下一場
            </button>
        </div>

        <button class="back-btn" onclick="window.location.href='/'" style="position: absolute; top: 30px; left: 30px; z-index: 1000; background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;">
            ⬅ 返回大廳
        </button>
        
    </div>

    <script src="/static/js/data.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/lenormand.js"></script>
</body>
</html>

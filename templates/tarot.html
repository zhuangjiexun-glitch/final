<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔羅占卜 - 命運大廳</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="orb"></div>

    <div id="tarotScreen" style="display: flex; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 20px; box-sizing: border-box;">
        
        <h1 class="fortune-title" style="margin-bottom: 10px; z-index: 5; color: white;">
            星象塔羅占卜 
        </h1>
        <p class="fortune-subtitle" id="tarotInstruction" style="margin-bottom: 30px; z-index: 5; color: white;">
            請選擇你想占卜的問題方向
        </p>

        <div style="background: rgba(12, 8, 30, 0.6); padding: 40px; border-radius: 16px; border: 1px solid rgba(170, 120, 255, 0.4); max-width: 600px; width: 90%; text-align: center; z-index: 5; box-shadow: 0 0 30px rgba(170, 120, 255, 0.1);">
            
            <div id="questionTypeArea" style="display: flex; gap: 20px; justify-content: center;">
                <button onclick="startDrawing('love')" style="background: rgba(255, 100, 150, 0.2); border: 1px solid #ff6496; color: #ff6496; padding: 12px 40px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; font-family: inherit;">
                    ❤️ 感情 <span style="font-size: 14px;">(💰20)</span>
                </button>
                <button onclick="startDrawing('career')" style="background: rgba(100, 200, 255, 0.2); border: 1px solid #64c8ff; color: #64c8ff; padding: 12px 40px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; font-family: inherit;">
                    💼 事業 <span style="font-size: 14px;">(💰20)</span>
                </button>
            </div>

            <div id="tarotDrawArea" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                <div style="display: flex; flex-direction: row; justify-content: center; gap: 30px; margin-bottom: 20px; min-height: 250px; width: 100%;">
                    
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
                        <span style="color: rgba(255, 255, 255, 0.9); font-size: 18px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(170, 120, 255, 0.8);">過去</span>
                        <div class="card-container" id="card-0">
                            <div class="card-inner">
                                <div class="card-front"></div>
                                <div class="card-back" id="slot-0"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
                        <span style="color: rgba(255, 255, 255, 0.9); font-size: 18px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(170, 120, 255, 0.8);">現在</span>
                        <div class="card-container" id="card-1">
                            <div class="card-inner">
                                <div class="card-front"></div>
                                <div class="card-back" id="slot-1"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
                        <span style="color: rgba(255, 255, 255, 0.9); font-size: 18px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(170, 120, 255, 0.8);">未來</span>
                        <div class="card-container" id="card-2">
                            <div class="card-inner">
                                <div class="card-front"></div>
                                <div class="card-back" id="slot-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <p id="selectionProgress" style="color: #64c8ff; font-size: 16px; margin-bottom: 0;">請從下方牌陣憑直覺選出 3 張牌 (0/3)</p>
                <div id="tarotFanArea"></div>
            </div>

            <div id="tarotResultArea" style="display: none; flex-direction: column; align-items: center;">
                <div id="aiLoading" style="color: #ffd700; margin-bottom: 15px; font-style: italic; font-size: 18px;">
                    ✨ 正在與宇宙連結，解讀星象指引... ✨
                </div>
                
                <div id="aiExplanation" style="display: none; font-size: 16px; color: rgba(255, 255, 255, 0.95); line-height: 1.8; background: rgba(0, 0, 0, 0.5); padding: 25px; border-radius: 12px; border: 1px solid rgba(170, 120, 255, 0.3); text-align: left; width: 100%;">
                </div>

                <button onclick="resetTarot()" style="margin-top: 25px; background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); color: rgba(255, 255, 255, 0.8); padding: 10px 30px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 16px; font-family: inherit;">
                    重新占卜
                </button>
            </div>
        </div>

        <button class="back-btn" onclick="window.location.href='/'" style="position: absolute; top: 30px; left: 30px; z-index: 1000; background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;">
            ⬅ 返回大廳
        </button>
    </div>

    <script src="/static/js/data.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/tarot.js"></script>
    </body>
</html>

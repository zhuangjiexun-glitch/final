    <!-- ===================== -->
    <!-- 神燈精靈頁面 -->
    <!-- ===================== -->

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神燈精靈 - 命運大廳</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div id="geniePage" style="display: flex; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 20px; box-sizing: border-box;">
        <h1 class="fortune-title" style="margin-bottom: 10px; z-index: 5; color: white;">
            神燈精靈
        </h1>
        <p class="fortune-subtitle" id="genieSubtitle" style="margin-bottom: 30px; z-index: 5; color: white;">
            請心想一個人物，我會試著猜出你想的是誰
        </p>

        <div style="background: rgba(12, 8, 30, 0.6); padding: 40px; border-radius: 16px; border: 1px solid rgba(170, 120, 255, 0.4); max-width: 700px; width: 90%; text-align: center; z-index: 5; box-shadow: 0 0 30px rgba(170, 120, 255, 0.1);">
            
            <!-- 遊戲開始區域 -->
            <div id="genieStartArea" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <p style="color: rgba(255, 255, 255, 0.8); font-size: 16px; line-height: 1.6;">
                    想好一個人物後，點擊下方按鈕開始遊戲。我會透過提問來猜測你心中想的人物，你只需要回答「是」或「否」即可。
                </p>
                <button onclick="startGenieGame()" style="background: rgba(100, 200, 255, 0.2); border: 1px solid #64c8ff; color: #64c8ff; padding: 12px 40px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s;">
                    開始遊戲<span style="font-size: 14px;">(💰15)</span>
                </button>
            </div>

            <!-- 遊戲進行區域 -->
            <div id="genieGameArea" style="display: none; flex-direction: column; align-items: center; gap: 20px;">
                
                <!-- 問題計數 -->
                <div style="color: rgba(255, 255, 255, 0.6); font-size: 14px;">
                    第 <span id="genieQuestionCount">1</span> / <span id="genieMaxQuestions">20</span> 個問題
                </div>

                <!-- 當前問題 -->
                <div id="genieCurrentQuestion" style="background: rgba(0, 0, 0, 0.5); padding: 20px; border-radius: 8px; border: 1px solid rgba(100, 200, 255, 0.3); width: 100%; font-size: 16px; color: rgba(255, 255, 255, 0.95); line-height: 1.6;">
                    正在初始化...
                </div>

                <!-- 回答按鈕 -->
                <div style="display: flex; gap: 20px; justify-content: center; width: 100%;">
                    <button onclick="answerGenie('YES')" id="genieYesBtn" style="background: rgba(100, 255, 100, 0.2); border: 1px solid #64ff64; color: #64ff64; padding: 12px 50px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; flex: 1;">
                        是
                    </button>
                    <button onclick="answerGenie('NO')" id="genieNoBtn" style="background: rgba(255, 100, 100, 0.2); border: 1px solid #ff6464; color: #ff6464; padding: 12px 50px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; flex: 1;">
                        否
                    </button>
                </div>

                <!-- Loading 狀態 -->
                <div id="genieLoading" style="display: none; color: #ffd700; font-style: italic; font-size: 16px;">
                     精靈正在思考... 
                </div>
            </div>

            <!-- 遊戲結果區域 -->
            <div id="genieResultArea" style="display: none; flex-direction: column; align-items: center; gap: 20px;">
                
                <div id="genieResultMessage" style="background: rgba(0, 0, 0, 0.5); padding: 25px; border-radius: 8px; border: 1px solid rgba(255, 215, 0, 0.3); font-size: 16px; color: rgba(255, 255, 255, 0.95); line-height: 1.8; width: 100%;">
                </div>

                <button onclick="resetGenieGame()" style="background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: rgba(170, 120, 255, 0.9); padding: 12px 30px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 16px;">
                    🔄 再來一次
                </button>
            </div>
        </div>

        <button class="back-btn" onclick="window.location.href='/'" style="position: absolute; top: 30px; left: 30px; z-index: 1000; background: rgba(170, 120, 255, 0.2); border: 1px solid rgba(170, 120, 255, 0.8); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;">
            ⬅ 返回大廳
        </button>
    </div>

    <script src="/static/js/data.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/genie.js"></script>
</body>
</html>
